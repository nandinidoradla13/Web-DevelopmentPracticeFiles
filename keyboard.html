<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>keyboard design</title>
    <style>
        .keyboard{
            background-color: rgb(100, 99, 99);
            padding: 10px;
            border-radius: 10px;
            box-shadow:10px ;
            width: 50%;
        }
        .row{
            display: flex;
            margin: 10px;
        }
        .keys{
            width: 50px;
            height: 50px;
            margin: 5px;
            background-color: #5d5c5c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .key :hover{
            background-color: #777;
        }
        .wide{
            width: 100px;
        }
        .space{
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="keyboard">
        <div class="row">
            <button class="q">q</button>
            <button class="w">w</button>
            <button class="e">e</button>
            <button class="r">r</button>
            <button class="t">t</button>
            <button class="y">y</button>
            <button class="u">u</button>
            <button class="i">i</button>
            <button class="o">o</button>
            <button class="p">p</button>
        </div>
        <div class="row">
            <button class="a">a</button>
            <button class="s">s</button>
            <button class="d">d</button>
            <button class="f">f</button>
            <button class="g">g</button>
            <button class="h">h</button>
            <button class="j">j</button>
            <button class="k">k</button>
            <button class="l">l</button>
        </div>
        <div class="row">
            <button class="z">z</button>
            <button class="x">x</button>
            <button class="c">c</button>
            <button class="v">v</button>
            <button class="b">b</button>
            <button class="n">n</button>
            <button class="m">m</button>
        </div>
        <div class="row">
            <button class="key wide"> shift</button>
            <button class="key space">space</button>
            <button class="key wide">enter</button>
        </div>
    </div>
    
</body>
</html>
