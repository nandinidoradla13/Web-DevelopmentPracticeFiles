<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class example</title>
    <style>
    .city {
  background-color: tomato;
  color: white;
  border: 4px solid black;
  margin: 20px;
  padding: 20px;
  width: 40%;
  text-align: center;
}
  .city h2:hover {
    background-color: aquamarine;
   color: blue;
   border: 40%;
   transition: all;
  }
  .city p:hover {
    background-color: aliceblue;
    color: brown;
    border: 20%;
    transition: all;
  }
  .city div:hover {
    background-color: azure;
    color: blueviolet;
    transition: all;
  }
</style>
</head>
<body>
<div class="city">
  <h2>London</h2>
  <p>London is the capital of England.</p>
</div>

<div class="city">
  <h2>Paris</h2>
  <p>Paris is the capital of France.</p>
</div>

<div class="city">
  <h2>Tokyo</h2>
  <p>Tokyo is the capital of Japan.</p>
</div>
</body>
</html>
